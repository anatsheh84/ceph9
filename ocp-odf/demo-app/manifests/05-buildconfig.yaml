# Builds the app image in-cluster from your GitHub repo using the Containerfile.
#
# >>> EDIT spec.source.git.uri to your GitHub repo before deploying. <<<
# contextDir assumes the repo root contains ocp-odf/demo-app (i.e. you push the
# whole ceph9 working tree). Adjust if you push only the demo-app folder.
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: ceph-demo-app
  namespace: ceph-demo
spec:
  source:
    type: Git
    git:
      uri: https://github.com/anatsheh84/ceph9.git
      ref: main
    contextDir: ocp-odf/demo-app
    # repo is public → anonymous clone; no sourceSecret needed
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: ceph-demo-app:latest
  # No auto-triggers — deploy.sh starts the build explicitly (after the git
  # source secret exists), so the first build can't race ahead of its creds.
