---
# ============================================================================
# Phase 07 (OPTIONAL) — HA gateway endpoints behind internal AWS NLBs.
#
#   * NFS: scale the nfslab ganesha cluster to N daemons (rados_cluster
#     recovery backend) for HA.
#   * NLBs: one internal Network Load Balancer per gateway service —
#       - NFS  (TCP 2049) -> ganesha on nfs_ha_hosts
#       - RGW  (TCP 8080) -> radosgw on rgw_ha_hosts
#     so clients use one endpoint with health-checked failover.
#
# Why NLB and not Ceph's `ingress`: ingress uses keepalived VRRP/VIP, which
# can't float in an AWS VPC. An internal NLB is the AWS-native equivalent.
# (RBD/CephFS need no LB — clients talk to mons/OSDs/MDS directly; HA is native.)
#
# Run with 00 for the inventory:
#   ansible-playbook playbooks/00_provision_aws.yml playbooks/07_nfs_ha_lb.yml
#
# Idempotent + re-runnable.
# ============================================================================

# ---------- PLAY A: scale ganesha for NFS HA (admin) ------------------------
- name: NFS HA — scale ganesha daemons
  hosts: admin
  become: true
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../inventory/topologies/{{ ceph_topology }}.yml"
  tasks:
    - name: Label nfs_ha_hosts with 'nfs'
      ansible.builtin.command:
        cmd: /usr/sbin/cephadm shell -- ceph orch host label add {{ item }} nfs
      loop: "{{ nfs_ha_hosts }}"
      register: lbl
      changed_when: "'Added label' in lbl.stdout"
      failed_when:
        - lbl.rc != 0
        - "'already' not in lbl.stdout + lbl.stderr"

    - name: Wait for {{ nfs_ha_hosts | length }} ganesha daemons running
      ansible.builtin.shell: |
        /usr/sbin/cephadm shell -- ceph orch ps --daemon-type nfs --format json 2>/dev/null \
          | python3 -c "import sys,json;print(sum(1 for d in json.load(sys.stdin) if d.get('status_desc')=='running'))"
      register: nfs_running
      until: nfs_running.stdout | int >= (nfs_ha_hosts | length)
      retries: 30
      delay: 10
      changed_when: false

# ---------- PLAY B: one internal NLB per gateway service (localhost/aws) -----
- name: HA endpoints — internal NLBs (NFS + RGW)
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../inventory/topologies/{{ ceph_topology }}.yml"
  tasks:
    - name: Resolve VPC / private subnet / SG
      ansible.builtin.shell: |
        echo "VPC=$(aws ec2 describe-vpcs --region {{ aws_region }} --filters 'Name=tag:Name,Values={{ project_tag }}-vpc' --query 'Vpcs[0].VpcId' --output text)"
        echo "SUB=$(aws ec2 describe-subnets --region {{ aws_region }} --filters 'Name=tag:Name,Values={{ project_tag }}-private' --query 'Subnets[0].SubnetId' --output text)"
        echo "SG=$(aws ec2 describe-security-groups --region {{ aws_region }} --filters 'Name=tag:Name,Values={{ project_tag }}-sg' --query 'SecurityGroups[0].GroupId' --output text)"
      register: ids_out
      changed_when: false

    - name: Set infra facts
      ansible.builtin.set_fact:
        vpc_id: "{{ ids_out.stdout | regex_search('VPC=(\\S+)', '\\1') | first }}"
        priv_subnet: "{{ ids_out.stdout | regex_search('SUB=(\\S+)', '\\1') | first }}"
        ceph_sg: "{{ ids_out.stdout | regex_search('SG=(\\S+)', '\\1') | first }}"

    - name: Create internal NLB per service (idempotent)
      ansible.builtin.shell: |
        set -e
        REGION={{ aws_region }}; NAME={{ item.name }}; TGN={{ item.tg }}; PORT={{ item.port }}
        IIDS=""
        for h in {{ item.hosts | join(' ') }}; do
          iid=$(aws ec2 describe-instances --region $REGION \
            --filters "Name=tag:Name,Values=$h" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          IIDS="$IIDS Id=$iid"
        done
        TG=$(aws elbv2 create-target-group --region $REGION --name $TGN --protocol TCP --port $PORT \
              --vpc-id {{ vpc_id }} --target-type instance --health-check-protocol TCP --health-check-port $PORT \
              --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null \
            || aws elbv2 describe-target-groups --region $REGION --names $TGN --query 'TargetGroups[0].TargetGroupArn' --output text)
        aws elbv2 register-targets --region $REGION --target-group-arn "$TG" --targets $IIDS
        LB=$(aws elbv2 create-load-balancer --region $REGION --name $NAME --type network --scheme internal \
              --subnets {{ priv_subnet }} --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null \
            || aws elbv2 describe-load-balancers --region $REGION --names $NAME --query 'LoadBalancers[0].LoadBalancerArn' --output text)
        aws elbv2 describe-listeners --region $REGION --load-balancer-arn "$LB" \
          --query "Listeners[?Port==\`$PORT\`]" --output text | grep -q . \
          || aws elbv2 create-listener --region $REGION --load-balancer-arn "$LB" --protocol TCP --port $PORT \
               --default-actions Type=forward,TargetGroupArn="$TG" >/dev/null
        aws ec2 authorize-security-group-ingress --region $REGION --group-id {{ ceph_sg }} \
          --ip-permissions "IpProtocol=tcp,FromPort=$PORT,ToPort=$PORT,IpRanges=[{CidrIp={{ vpc_cidr }},Description=nlb}]" \
          >/dev/null 2>&1 || true
        aws elbv2 wait load-balancer-available --region $REGION --load-balancer-arns "$LB"
        DNS=$(aws elbv2 describe-load-balancers --region $REGION --load-balancer-arns "$LB" --query 'LoadBalancers[0].DNSName' --output text)
        IP=$(aws ec2 describe-network-interfaces --region $REGION --filters "Name=description,Values=ELB net/$NAME/*" --query 'NetworkInterfaces[0].PrivateIpAddress' --output text)
        echo "$NAME -> $IP:$PORT  ($DNS)"
      loop: "{{ ceph_nlbs }}"
      loop_control: { label: "{{ item.name }}" }
      register: nlb_results
      changed_when: true

    - name: HA endpoints summary
      ansible.builtin.debug:
        msg: "{{ nlb_results.results | map(attribute='stdout') | list }}"
