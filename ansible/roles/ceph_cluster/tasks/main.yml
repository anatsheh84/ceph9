---
# Distribute the cluster pubkey to ceph02-04 (ec2-user) so cephadm can SSH,
# then add the hosts and apply labels and MON/MGR placement specs.

# This runs ONCE on the admin node, against an in-memory list of targets.

- name: Push /etc/ceph/ceph.pub into ec2-user's authorized_keys on every ceph node
  ansible.posix.authorized_key:
    user: ec2-user
    key: "{{ hostvars[groups['admin'][0]].cluster_ssh_pub }}"
    state: present
  when: hostvars[groups['admin'][0]].cluster_ssh_pub is defined

- name: Admin-only block — orchestrator operations
  when: "'admin' in group_names"
  block:

    # cephadm's default mon/mgr specs (count 5 / 2) auto-deploy onto new hosts as
    # soon as they're added, then our label:mon / label:mgr pin removes the
    # extras — leaving stray daemon state that trips HEALTH_WARN. Freeze
    # placement BEFORE adding hosts so only the labelled hosts ever get a
    # mon/mgr; the pin tasks below re-manage with the correct placement.
    - name: Freeze mon/mgr auto-placement before adding hosts
      ansible.builtin.shell: |
        /usr/sbin/cephadm shell -- ceph orch apply mon --unmanaged=true
        /usr/sbin/cephadm shell -- ceph orch apply mgr --unmanaged=true
      changed_when: false

    - name: Add ceph02-04 to the cluster
      ansible.builtin.command:
        cmd: /usr/sbin/cephadm shell -- ceph orch host add {{ item.name }} {{ item.ip }}
      loop: "{{ ceph_nodes | rejectattr('name','==', ceph_bootstrap_node) | list }}"
      register: host_add
      changed_when: "'Added' in host_add.stdout"
      failed_when:
        - host_add.rc != 0
        - "'already part of' not in host_add.stderr"
        - "'already' not in host_add.stdout"

    - name: Apply host labels
      ansible.builtin.command:
        cmd: /usr/sbin/cephadm shell -- ceph orch host label add {{ item.0.name }} {{ item.1 }}
      loop: "{{ ceph_nodes | subelements('labels') }}"
      register: lbl
      changed_when: "'Added label' in lbl.stdout"
      failed_when:
        - lbl.rc != 0
        - "'already' not in lbl.stdout"
        - "'already' not in lbl.stderr"

    - name: Pin MON placement
      ansible.builtin.command:
        cmd: /usr/sbin/cephadm shell -- ceph orch apply mon --placement=label:mon
      changed_when: false

    - name: Pin MGR placement
      ansible.builtin.command:
        cmd: /usr/sbin/cephadm shell -- ceph orch apply mgr --placement=label:mgr
      changed_when: false

    # --- OSD provisioning -------------------------------------------------
    # 4node: consume all attached gp3 data disks (default device class 'ssd';
    # phase 06 later reclassifies the st1 disk to 'hdd').
    - name: Deploy OSDs on every available device (4node)
      ansible.builtin.command:
        cmd: /usr/sbin/cephadm shell -- ceph orch apply osd --all-available-devices
      when: osd_disks_per_node is defined
      changed_when: false

    - name: Wait for all OSDs to come up (4node)
      ansible.builtin.shell: |
        set -o pipefail
        cephadm shell -- ceph -s 2>/dev/null \
          | grep -oE '[0-9]+ osds: [0-9]+ up' \
          | awk '{print $3}'
      register: osd_up
      until: (osd_up.stdout | int) == (ceph_nodes | length) * osd_disks_per_node
      retries: 40
      delay: 15
      when: osd_disks_per_node is defined
      changed_when: false

    # 12node-tiered: ONE explicit OSD per host with its CRUSH device class set at
    # creation. A per-tier drivegroup spec targets that tier's hosts and its one
    # data device — never --all-available-devices, never scans spare volumes.
    - name: Deploy single-disk OSDs per tier (12node-tiered)
      when: osd_data_device is defined
      block:
        - name: Render per-tier OSD drivegroup specs
          ansible.builtin.template:
            src: osd-spec.yml.j2
            dest: "/tmp/osd-{{ item }}.yml"
            mode: '0644'
          loop: "{{ ceph_tier_order }}"

        - name: Apply per-tier OSD drivegroup specs (class set at creation)
          ansible.builtin.command:
            cmd: /usr/sbin/cephadm shell --mount /tmp/osd-{{ item }}.yml -- ceph orch apply -i /mnt/osd-{{ item }}.yml
          loop: "{{ ceph_tier_order }}"
          changed_when: true

        - name: Wait for all OSDs to come up (one per host)
          ansible.builtin.shell: |
            set -o pipefail
            cephadm shell -- ceph -s 2>/dev/null \
              | grep -oE '[0-9]+ osds: [0-9]+ up' \
              | awk '{print $3}'
          register: osd_up_tiered
          until: (osd_up_tiered.stdout | int) == (ceph_nodes | length)
          retries: 60
          delay: 15
          changed_when: false
