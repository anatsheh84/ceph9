---
# Group-only skeleton. Host entries are NOT hard-coded here because node names
# differ per topology (ceph01-04 for 4node-twotier; nvme/sas/sata01-04 for
# 12node-tiered). The aws_infra role (phase 00) populates these groups at
# runtime via `add_host`, assigning each node to 'ceph' plus either 'admin'
# (the single ceph_bootstrap_node) or 'cephworkers', with per-host ansible_host
# and a bastion ProxyCommand. Always run phase 00 first (site.yml / provision.sh
# do). To run 01+ standalone, add_host the nodes yourself or pass a populated
# inventory.
all:
  vars:
    ansible_user: ec2-user
    ansible_ssh_private_key_file: "{{ key_local_path | default('~/.ssh/ceph9-lab.pem') }}"
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking=accept-new
      -o UserKnownHostsFile=~/.ssh/ceph9-known_hosts
  children:
    bastions:
      hosts: {}
    ceph:
      hosts: {}
    admin:
      hosts: {}
    cephworkers:
      hosts: {}
