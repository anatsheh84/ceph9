---
# Static inventory by short names only. ansible_host values are populated
# at runtime by the aws_infra role via `add_host`. If you want to run
# 01..05 standalone (without 00_provision_aws), invoke ansible-playbook with
# `--inventory inventory/hosts.yml --extra-vars "@.provisioned.json"` and
# also export ANSIBLE_HOST_KEY_CHECKING=False, or rely on Route53 records.

all:
  vars:
    ansible_user: ec2-user
    ansible_ssh_private_key_file: "{{ key_local_path | default('~/.ssh/ceph9-lab.pem') }}"
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking=accept-new
      -o UserKnownHostsFile=~/.ssh/ceph9-known_hosts

  children:
    bastions:
      hosts:
        bastion:

    ceph:
      vars:
        ansible_ssh_common_args: >-
          -o StrictHostKeyChecking=accept-new
          -o UserKnownHostsFile=~/.ssh/ceph9-known_hosts
          -o ProxyJump=ec2-user@{{ hostvars['bastion'].ansible_host | default('bastion') }}
      hosts:
        ceph01:
        ceph02:
        ceph03:
        ceph04:

    admin:
      hosts:
        ceph01:

    cephworkers:
      hosts:
        ceph02:
        ceph03:
        ceph04:
